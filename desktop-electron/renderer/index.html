<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self';"
    />
    <title>CodexManager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-logo">CM</div>
          <div>
            <div class="brand-name">CodexManager</div>
            <div class="brand-subtitle">账号池 · 用量管理</div>
          </div>
        </div>

        <nav class="nav">
          <div class="nav-section">概览</div>
          <button class="nav-item" type="button" data-view="dashboard">
            <span class="nav-icon grid-icon" aria-hidden="true"></span>
            <span>仪表盘</span>
          </button>

          <div class="nav-section">资源接入</div>
          <button class="nav-item active" type="button" data-view="accounts">
            <span class="nav-icon users-icon" aria-hidden="true"></span>
            <span>OpenAI 账号池</span>
          </button>
          <button class="nav-item" type="button" data-view="api">
            <span class="nav-icon stack-icon" aria-hidden="true"></span>
            <span>聚合 API</span>
          </button>

          <div class="nav-section">模型路由</div>
          <button class="nav-item" type="button" data-view="models">
            <span class="nav-icon nodes-icon" aria-hidden="true"></span>
            <span>平台模型目录</span>
          </button>

          <div class="nav-section">用户与密钥</div>
          <button class="nav-item" type="button" data-view="keys">
            <span class="nav-icon key-icon" aria-hidden="true"></span>
            <span>平台密钥</span>
          </button>

          <div class="nav-section">运行监控</div>
          <button class="nav-item" type="button" data-view="logs">
            <span class="nav-icon file-icon" aria-hidden="true"></span>
            <span>请求日志</span>
          </button>

          <div class="nav-section">系统设置</div>
          <button class="nav-item" type="button" data-view="settings">
            <span class="nav-icon gear-icon" aria-hidden="true"></span>
            <span>系统设置</span>
          </button>
          <button class="nav-item" type="button" data-view="plugins">
            <span class="nav-icon puzzle-icon" aria-hidden="true"></span>
            <span>插件中心</span>
          </button>
          <button class="nav-item" type="button" data-view="support">
            <span class="nav-icon person-icon" aria-hidden="true"></span>
            <span>赞助与推荐</span>
          </button>
        </nav>

        <button class="collapse-button" type="button">
          <span aria-hidden="true">‹</span>
          <span>收起侧边栏</span>
        </button>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="title-block">
            <h1>OpenAI 账号池</h1>
            <span class="service-badge" id="serviceBadge">服务检测中</span>
          </div>

          <button class="disclaimer" type="button">
            <span class="shield-icon" aria-hidden="true"></span>
            <span>免责声明<br /><strong>作者不提供或分发任何账号、API Key 或代理服...</strong></span>
            <span class="details-link">详情 ›</span>
          </button>

          <div class="top-actions">
            <button class="pill-button" type="button" id="languageButton">
              <span class="globe-icon" aria-hidden="true"></span>
              <span>简体中文</span>
              <span>⌄</span>
            </button>
            <div class="port-pill">
              <span>监听端口</span>
              <strong id="portValue">--</strong>
            </div>
            <button class="switch on" type="button" aria-label="服务开关"></button>
          </div>
        </header>

        <section class="content">
          <div class="toolbar-card">
            <label class="search-field">
              <span class="search-icon" aria-hidden="true"></span>
              <input id="accountSearch" type="search" autocomplete="off" placeholder="搜索账号名 / 编号..." />
            </label>
            <select id="typeFilter" aria-label="账号类型">
              <option value="all">全部类型</option>
              <option value="plus">PLUS</option>
              <option value="pro">PRO</option>
              <option value="team">TEAM</option>
            </select>
            <select id="statusFilter" aria-label="账号状态">
              <option value="all">全部</option>
              <option value="available">可用</option>
              <option value="warning">需关注</option>
              <option value="unavailable">不可用</option>
            </select>
            <div class="toolbar-spacer"></div>
            <button class="action-button" type="button" id="refreshButton">
              <span class="bolt-icon" aria-hidden="true"></span>
              <span>预热</span>
            </button>
            <button class="action-button" type="button">
              <span>账号操作</span>
              <span class="dots" aria-hidden="true"></span>
            </button>
          </div>

          <div class="account-card">
            <div class="account-header">
              <label class="checkbox-cell"><input type="checkbox" /></label>
              <div>账号信息</div>
              <div>额度详情</div>
              <div>顺序</div>
              <div>状态</div>
              <div>操作</div>
            </div>
            <div class="account-rows" id="accountRows"></div>
          </div>

          <div class="table-footer">
            <div id="accountCount">共 0 个账号</div>
            <div class="pager">
              <span>每页显示</span>
              <button class="page-size" type="button">20⌄</button>
              <button class="page-button" type="button" disabled>上一页</button>
              <strong>第 1 / 1 页</strong>
              <button class="page-button" type="button" disabled>下一页</button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
