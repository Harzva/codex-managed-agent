name: Unified Release

on:
  push:
    tags:
      - "v*"
      - "!vsix-v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Attach the unified artifacts to an existing GitHub Release tag."
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Existing tag to publish when publish_release is true, for example v1.1.0."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Release Context
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.context.outputs.checkout_ref }}
      release_tag: ${{ steps.context.outputs.release_tag }}
      publish_release: ${{ steps.context.outputs.publish_release }}
    steps:
      - name: Resolve Checkout Ref
        id: context
        shell: bash
        run: |
          set -euo pipefail
          checkout_ref="${{ github.ref }}"
          release_tag=""
          publish_release="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.publish_release }}" = "true" ]; then
              release_tag="${{ inputs.release_tag }}"
              if [ -z "$release_tag" ]; then
                echo "::error::release_tag is required when publish_release is true."
                exit 1
              fi
              checkout_ref="$release_tag"
              publish_release="true"
            fi
          else
            checkout_ref="${{ github.ref_name }}"
            release_tag="${{ github.ref_name }}"
            publish_release="true"
          fi

          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"

  vsix:
    name: Build VSIX (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cma
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            os: windows-latest
            npm_platform: win32
            npm_arch: x64
            codex_package: "@openai/codex-win32-x64"
          - target: linux-x64
            os: ubuntu-latest
            npm_platform: linux
            npm_arch: x64
            codex_package: "@openai/codex-linux-x64"
          - target: darwin-arm64
            os: macos-latest
            npm_platform: darwin
            npm_arch: arm64
            codex_package: "@openai/codex-darwin-arm64"
          - target: darwin-x64
            os: macos-latest
            npm_platform: darwin
            npm_arch: x64
            codex_package: "@openai/codex-darwin-x64"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cma/package-lock.json

      - name: Check Source Layout
        shell: pwsh
        run: |
          if (!(Test-Path package.json)) { throw "Missing package.json" }
          if (!(Test-Path extension.js)) { throw "Missing extension.js" }
          if (!(Test-Path src/panel.js)) {
            Write-Error "::error file=cma/src/panel.js::Missing VSIX source. Restore cma/src before building a new VSIX."
            exit 1
          }

      - name: Read Package Version
        id: meta
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Configure GitHub Dependency URLs
        shell: pwsh
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install
        env:
          npm_config_platform: ${{ matrix.npm_platform }}
          npm_config_arch: ${{ matrix.npm_arch }}
        run: npm ci

      - name: Smoke Test
        shell: pwsh
        run: |
          $tests = @(
            "src/host/node-backend/node-backend.test.js",
            "src/host/server.test.js",
            "src/host/extension-load-smoke.test.js"
          ) | Where-Object { Test-Path $_ }
          if ($tests.Count -gt 0) {
            node --test $tests
          } else {
            Write-Host "No VSIX smoke tests found; skipping."
          }

      - name: VSIX Matrix Smoke
        shell: pwsh
        run: |
          @'
          const assert = require("assert");
          const { executableNames } = require("./src/host/platform-runtime");
          const target = process.env.VSCODE_TARGET;
          const names = executableNames("codex");
          if (target.startsWith("win32")) {
            assert(names.includes("codex.cmd"), "Windows target must probe codex.cmd");
            assert(names.includes("codex.exe"), "Windows target must probe codex.exe");
          } else {
            assert(names.includes("codex"), "POSIX target must probe codex");
          }
          console.log(`inventory smoke ok for ${target}: ${names.join(", ")}`);
          '@ | node -
        env:
          VSCODE_TARGET: ${{ matrix.target }}

      - name: Package VSIX
        run: npm run publish:vsix:target -- --target ${{ matrix.target }}

      - name: Write Release Manifest
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $manifest = [ordered]@{
            product = "codex-managed-agent-vsix"
            lane = "unified"
            packageVersion = $version
            releaseTag = "${{ needs.prepare.outputs.release_tag }}"
            target = "${{ matrix.target }}"
            runnerOs = "${{ runner.os }}"
            codexBinaryPackage = "${{ matrix.codex_package }}"
            sourceDirectory = "cma"
            refName = "${{ github.ref_name }}"
            sha = "${{ github.sha }}"
            runId = "${{ github.run_id }}"
            generatedAt = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json -Depth 8
          New-Item -ItemType Directory -Force -Path publisher | Out-Null
          Set-Content -Path "publisher/release-manifest-vsix-$version-${{ matrix.target }}.json" -Value $manifest -Encoding UTF8

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cma-unified-vsix-${{ matrix.target }}
          path: |
            cma/publisher/codex-managed-agent-${{ steps.meta.outputs.version }}-${{ matrix.target }}.vsix
            cma/publisher/release-manifest-vsix-${{ steps.meta.outputs.version }}-${{ matrix.target }}.json
          if-no-files-found: error
          retention-days: 14

  desktop-test:
    name: Test Desktop Shell
    needs: prepare
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-electron
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop-electron/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  desktop-package:
    name: Package ${{ matrix.name }}
    needs:
      - prepare
      - desktop-test
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop-electron
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            slug: windows
            os: windows-latest
            script: package:win
            artifact: cma-unified-desktop-windows
            paths: |
              desktop-electron/release/*.exe
              desktop-electron/release/*.zip
              desktop-electron/release/win-unpacked/**
          - name: macOS
            slug: macos
            os: macos-latest
            script: package:mac
            artifact: cma-unified-desktop-macos
            paths: |
              desktop-electron/release/*.dmg
              desktop-electron/release/*.zip
              desktop-electron/release/mac*/**
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop-electron/package-lock.json

      - name: Install
        run: npm ci

      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.script }}

      - name: Write Release Manifest
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $manifest = [ordered]@{
            product = "codex-managed-agent-desktop"
            lane = "unified"
            platform = "${{ matrix.slug }}"
            packageVersion = $version
            releaseTag = "${{ needs.prepare.outputs.release_tag }}"
            sourceDirectory = "desktop-electron"
            refName = "${{ github.ref_name }}"
            sha = "${{ github.sha }}"
            runId = "${{ github.run_id }}"
            generatedAt = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json -Depth 8
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Set-Content -Path "release/release-manifest-${{ matrix.slug }}.json" -Value $manifest -Encoding UTF8

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.paths }}
            desktop-electron/release/release-manifest-${{ matrix.slug }}.json
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Unified Release
    needs:
      - prepare
      - vsix
      - desktop-package
    if: needs.prepare.outputs.publish_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Resolve Release Tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.release_tag }}"
          if [ -z "$tag" ]; then
            echo "::error::Release tag was not resolved."
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag $tag does not exist. Create and push the tag first, or run this workflow without publish_release."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cma-unified-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Codex Managed Agent ${{ steps.release_meta.outputs.tag }}
          files: |
            release-assets/*.vsix
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.json
          generate_release_notes: true
