name: Desktop Electron Build

on:
  pull_request:
    paths:
      - "desktop-electron/**"
      - ".github/workflows/desktop-electron-build.yml"
  push:
    branches:
      - main
      - master
    tags:
      - "desktop-v*"
    paths:
      - "desktop-electron/**"
      - ".github/workflows/desktop-electron-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: desktop-electron

jobs:
  test:
    name: Test Desktop Shell
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop-electron/package-lock.json

      - name: Install
        run: npm ci

      - name: Read Package Version
        id: meta
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Check Desktop Tag Version
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: pwsh
        run: |
          $prefix = "desktop-v"
          $tagVersion = "${{ github.ref_name }}".Substring($prefix.Length)
          $packageVersion = "${{ steps.meta.outputs.version }}"
          if ($tagVersion -ne $packageVersion) {
            Write-Error "Tag desktop-v$tagVersion does not match desktop package version $packageVersion."
          }

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  package:
    name: Package ${{ matrix.name }}
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            slug: windows
            os: windows-latest
            script: package:win
            artifact: cma-desktop-windows
            paths: |
              desktop-electron/release/*.exe
              desktop-electron/release/*.zip
              desktop-electron/release/win-unpacked/**
          - name: macOS
            slug: macos
            os: macos-latest
            script: package:mac
            artifact: cma-desktop-macos
            paths: |
              desktop-electron/release/*.dmg
              desktop-electron/release/*.zip
              desktop-electron/release/mac*/**
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop-electron/package-lock.json

      - name: Install
        run: npm ci

      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.script }}

      - name: Write Release Manifest
        shell: pwsh
        run: |
          $manifest = [ordered]@{
            product = "codex-managed-agent-desktop"
            lane = "desktop"
            platform = "${{ matrix.slug }}"
            packageVersion = "${{ needs.test.outputs.version }}"
            sourceDirectory = "desktop-electron"
            refName = "${{ github.ref_name }}"
            sha = "${{ github.sha }}"
            runId = "${{ github.run_id }}"
            generatedAt = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json -Depth 8
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Set-Content -Path "release/release-manifest-${{ matrix.slug }}.json" -Value $manifest -Encoding UTF8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.paths }}
            desktop-electron/release/release-manifest-${{ matrix.slug }}.json
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Desktop Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Desktop Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cma-desktop-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Codex Managed Agent Desktop ${{ github.ref_name }}
          files: |
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.json
          generate_release_notes: true
